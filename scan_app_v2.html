<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>STC 적재 스캔</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Segoe UI",Arial,sans-serif;background:#f4f5f7;color:#111827;min-height:100vh;}

/* 시작 화면 */
#start{max-width:400px;margin:0 auto;padding:40px 20px;}
.logo{text-align:center;font-size:48px;margin-bottom:8px;}
.app-title{text-align:center;font-size:20px;font-weight:700;color:#1E2D5A;margin-bottom:4px;}
.app-sub{text-align:center;font-size:12px;color:#6B7280;margin-bottom:28px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:600;color:#6B7280;margin-bottom:5px;text-transform:uppercase;}
.field input{width:100%;padding:12px 14px;border:1.5px solid #E2E4E9;border-radius:10px;font-size:15px;background:#fff;}
.field input:focus{outline:none;border-color:#1E2D5A;}
.start-btn{width:100%;padding:14px;border-radius:12px;background:#1E2D5A;color:#fff;font-size:16px;font-weight:700;border:none;cursor:pointer;margin-top:8px;}
.start-btn:disabled{background:#9CA3AF;cursor:not-allowed;}

/* 메인 */
#main{display:none;}
.topbar{background:#1E2D5A;color:#fff;padding:11px 16px;display:flex;justify-content:space-between;align-items:center;}
.tb-title{font-size:14px;font-weight:700;}
.tb-sub{font-size:10px;color:#93a4c9;margin-top:2px;}
.tb-clock{font-size:15px;font-weight:700;}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#E2E4E9;}
.kpi-box{background:#fff;padding:10px 4px;text-align:center;}
.kpi-val{font-size:20px;font-weight:700;}
.kpi-lbl{font-size:10px;color:#6B7280;margin-top:1px;}

/* 카메라 */
.cam-wrap{padding:10px 14px;}
.sec-lbl{font-size:10px;font-weight:600;color:#6B7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
#qr-reader{width:100%;border-radius:10px;overflow:hidden;border:2px solid #1E2D5A;background:#000;}

/* 결과 카드 */
.result{display:none;margin:8px 14px 0;border-radius:10px;padding:12px;border:2px solid;}
.result.ok    {background:#fff;border-color:#0F6E56;}
.result.err   {background:#FEE2E2;border-color:#FCA5A5;}
.result.dup   {background:#FEF3C7;border-color:#FCD34D;}
.r-name{font-size:14px;font-weight:700;color:#1E2D5A;margin-bottom:2px;}
.r-sub{font-size:11px;color:#6B7280;margin-bottom:8px;}
.r-msg{font-size:13px;font-weight:600;}
.ok-txt{color:#0F6E56;}.err-txt{color:#B91C1C;}.warn-txt{color:#92400E;}

/* 수량 표시 */
.qty-badge{background:#1E2D5A;color:#fff;border-radius:8px;padding:8px 12px;margin:6px 0;display:flex;justify-content:space-between;align-items:center;}
.qty-lbl{font-size:10px;color:#93a4c9;}
.qty-num{font-size:22px;font-weight:700;}
.qty-unit{font-size:11px;color:#93a4c9;}

/* 진행 바 */
.prog-bg{height:10px;background:#E5E7EB;border-radius:5px;overflow:hidden;margin:4px 0;}
.prog-fill{height:100%;border-radius:5px;transition:width .4s;}
.fill-prog{background:#1D4ED8;}.fill-done{background:#0F6E56;}

/* 저장 버튼 */
.save-btn{width:calc(100% - 28px);margin:8px 14px 0;padding:12px;border-radius:10px;color:#fff;font-size:14px;font-weight:700;border:none;cursor:pointer;display:none;background:#1D4ED8;}
.save-btn:disabled{background:#9CA3AF;cursor:not-allowed;}

/* 품목 리스트 */
.item-list-wrap{padding:8px 14px 80px;}
.li{background:#fff;border-radius:10px;border:1px solid #E2E4E9;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px;}
.li.done{border-color:#6EE7B7;background:#F0FDF9;}
.li.prog{border-color:#93C5FD;background:#EFF6FF;}
.li-info{flex:1;min-width:0;}
.li-name{font-size:12px;font-weight:700;color:#1E2D5A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.li-code{font-size:10px;font-family:monospace;color:#6B7280;}
.li-right{text-align:right;flex-shrink:0;}
.li-qty{font-size:13px;font-weight:700;}
.li-status{font-size:10px;font-weight:600;}
.mini-bar{height:4px;background:#E5E7EB;border-radius:2px;overflow:hidden;margin-top:4px;min-width:60px;}
.mini-fill{height:100%;border-radius:2px;}

/* 로딩 */
.loading{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:10px;}
.loading.show{display:flex;}
.spinner{width:36px;height:36px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{color:#fff;font-size:13px;font-weight:600;}

/* 취소 모드 */
.cxl-banner{display:none;background:#B91C1C;color:#fff;padding:8px 14px;font-size:12px;font-weight:700;text-align:center;}
.cxl-banner.show{display:block;}
.result.cxl{background:#FEF2F2;border-color:#B91C1C;}
.cxl-btn{width:calc(100% - 28px);margin:8px 14px 0;padding:14px;border-radius:10px;color:#fff;
font-size:15px;font-weight:700;border:none;cursor:pointer;display:none;background:#B91C1C;}
.cxl-btn:disabled{background:#9CA3AF;cursor:not-allowed;}
.cxl-confirm{background:#fff;border:2px solid #B91C1C;border-radius:10px;padding:12px;margin:8px 14px 0;display:none;}
.cxl-confirm.show{display:block;}
.cxl-q{font-size:14px;font-weight:700;color:#B91C1C;margin-bottom:4px;}
.cxl-detail{font-size:12px;color:#374151;margin-bottom:10px;line-height:1.5;}
.cxl-detail b{color:#111827;font-size:14px;}
.cxl-actions{display:flex;gap:8px;}
.cxl-actions button{flex:1;padding:12px;border-radius:8px;font-size:14px;font-weight:700;border:none;cursor:pointer;}
.cxl-no{background:#E5E7EB;color:#374151;}
.cxl-yes{background:#B91C1C;color:#fff;}
.topbar.cxl-on{background:#B91C1C;}
.shp-banner{display:none;background:#1D4ED8;color:#fff;padding:8px 14px;font-size:12px;font-weight:700;text-align:center;}
.shp-banner.show{display:block;}
.topbar.shp-on{background:#1D4ED8;}
.result.shp{background:#EFF6FF;border-color:#1D4ED8;}
.shp-btn{width:calc(100% - 28px);margin:8px 14px 0;padding:14px;border-radius:10px;color:#fff;font-size:15px;font-weight:700;border:none;cursor:pointer;display:none;background:#1D4ED8;}
.shp-btn:disabled{background:#9CA3AF;}
</style>
</head>
<body>

<!-- 시작 화면 -->
<div id="start">
  <div class="logo">📦</div>
  <div class="app-title">STC 적재 스캔</div>
  <div class="app-sub">BOX / PALLET QR 스캔 시스템</div>
  <div class="field">
    <label>스캔 모드 *</label>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <button type="button" id="mode-box-btn" onclick="setScanMode('BOX')" style="padding:12px;border-radius:10px;border:1.5px solid #1E2D5A;background:#1E2D5A;color:#fff;font-size:14px;font-weight:700;cursor:pointer">📦 BOX 적재</button>
      <button type="button" id="mode-plt-btn" onclick="setScanMode('PALLET')" style="padding:12px;border-radius:10px;border:1.5px solid #E2E4E9;background:#fff;color:#111827;font-size:14px;font-weight:700;cursor:pointer">🏗️ PALLET 적재</button>
      <button type="button" id="mode-shp-btn" onclick="setScanMode('SHIP_STOCK')" style="padding:12px;border-radius:10px;border:1.5px solid #E2E4E9;background:#fff;color:#111827;font-size:14px;font-weight:700;cursor:pointer">🚚 재고 출하</button>
      <button type="button" id="mode-cxl-btn" onclick="setScanMode('CANCEL')" style="padding:12px;border-radius:10px;border:1.5px solid #E2E4E9;background:#fff;color:#111827;font-size:14px;font-weight:700;cursor:pointer">🔴 취소</button>
    </div>
  </div>
  <div class="field">
    <label>작업 날짜 *</label>
    <input type="date" id="s-date">
  </div>
  <div class="field">
    <label>컨테이너 번호 <span style="color:#9CA3AF;font-size:10px">(선택 — 나중에 배정 가능)</span></label>
    <input id="s-cont" placeholder="없으면 비워두세요" oninput="chkStart()">
  </div>
  <div class="field">
    <label>작업자 이름 *</label>
    <input id="s-worker" placeholder="이름" oninput="chkStart()">
  </div>
  <button class="start-btn" id="start-btn" disabled onclick="goMain()">📷 스캔 시작</button>
</div>

<!-- 메인 화면 -->
<div id="main">
  <div class="topbar">
    <div>
      <div class="tb-title" id="t-cont">—</div>
      <div class="tb-sub" id="t-worker">작업자: —</div>
    </div>
    <button id="tb-mode-btn" onclick="toggleMainMode()" style="background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:8px;padding:6px 10px;font-size:11px;font-weight:700;cursor:pointer">📦 BOX</button>
    <div class="tb-clock" id="clock"></div>
  </div>

  <!-- KPI -->
  <div class="kpi-row">
    <div class="kpi-box"><div class="kpi-val" style="color:#1E2D5A" id="k-plan">0</div><div class="kpi-lbl">계획품목</div></div>
    <div class="kpi-box"><div class="kpi-val" style="color:#0F6E56" id="k-done">0</div><div class="kpi-lbl">완료</div></div>
    <div class="kpi-box"><div class="kpi-val" style="color:#B91C1C" id="k-miss">0</div><div class="kpi-lbl">미완료</div></div>
  </div>

  <!-- 카메라 -->
  <div class="cam-wrap">
    <div class="sec-lbl">📷 QR 스캔 (BOX/PALLET 자동 인식)</div>
    <div id="qr-reader"></div>
  </div>

  <!-- 취소 모드 배너 -->
  <div class="cxl-banner" id="cxl-banner">🔴 취소 모드 — 스캔한 등록 내역을 삭제합니다</div>
  <div class="shp-banner" id="shp-banner">🚚 재고 출하 모드 — 계획과 무관하게 재고 BOX를 출하합니다</div>

  <!-- 결과 카드 -->
  <div class="result" id="result"></div>

  <!-- 취소 확인창 -->
  <div class="cxl-confirm" id="cxl-confirm"></div>

  <!-- 저장 버튼 -->
  <button class="save-btn" id="save-btn" onclick="doSave()">✅ 저장</button>
  <button class="shp-btn" id="shp-btn" onclick="doShipStock()">🚚 재고 출하 확정</button>

  <!-- 품목 리스트 -->
  <div class="item-list-wrap" id="box-list-wrap">
    <div class="sec-lbl" style="margin-bottom:8px">품목별 진행 현황</div>
    <ul style="list-style:none" id="item-list"></ul>
  </div>
</div>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-txt" id="loading-txt">처리 중...</div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbxsHVhGmaG3MQngnYMPVJYDPvHgTzh7EGOSCPdUbw23KlurZUKuH-52uTF9w36KOxxo2A/exec";

let CFG     = { cont:"", worker:"", date:"", mode:"BOX" };
let PLAN    = [];
let scannedBoxes = new Set();
let pending = null;
let scanner = null;
let lastQR  = ""; let lastT = 0;

// 기기 로컬 날짜(YYYY-MM-DD) — toISOString()은 UTC라 자정 전후 날짜가 어긋날 수 있어 사용 금지
function localDateStr(d) {
  d = d || new Date();
  const y  = d.getFullYear();
  const m  = String(d.getMonth()+1).padStart(2,"0");
  const dd = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${dd}`;
}

// ── 시작 ──────────────────────────────────────
function setScanMode(mode) {
  CFG.mode = mode;
  const set = (id, on, color) => {
    const b = document.getElementById(id);
    b.style.background  = on ? color : '#fff';
    b.style.color       = on ? '#fff' : '#111827';
    b.style.borderColor = on ? color : '#E2E4E9';
  };
  set('mode-box-btn', mode==='BOX',        '#1E2D5A');
  set('mode-plt-btn', mode==='PALLET',     '#0F6E56');
  set('mode-shp-btn', mode==='SHIP_STOCK', '#1D4ED8');
  set('mode-cxl-btn', mode==='CANCEL',     '#B91C1C');
}

function chkStart() {
  const w = document.getElementById("s-worker").value.trim();
  document.getElementById("start-btn").disabled = !w;
}

// 날짜 필드 기본값 = 오늘 (기기 로컬 기준)
document.getElementById("s-date").value = localDateStr();

async function goMain() {
  CFG.cont   = document.getElementById("s-cont").value.trim() || "TBD";
  CFG.worker = document.getElementById("s-worker").value.trim();
  CFG.date   = document.getElementById("s-date").value || localDateStr();
  document.getElementById("start").style.display = "none";
  document.getElementById("main").style.display  = "block";
  document.getElementById("t-cont").textContent  = (CFG.cont === "TBD" ? "⏳ 컨테이너 미정" : CFG.cont) + "  ·  " + CFG.date;
  updateModeUI();
  startClock();
  await loadAll();
  initCam();
}

function updateModeUI() {
  const isCxl = CFG.mode === 'CANCEL';
  const isShp = CFG.mode === 'SHIP_STOCK';
  const label = {BOX:"📦 BOX", PALLET:"🏗️ PALLET", SHIP_STOCK:"🚚 재고출하", CANCEL:"🔴 취소"}[CFG.mode];
  document.getElementById("t-worker").textContent = "작업자: "+CFG.worker;
  document.getElementById("tb-mode-btn").textContent = label;
  document.getElementById("save-btn").textContent =
    CFG.mode==='PALLET' ? "✅ PALLET 저장" : "✅ BOX 저장";
  const tb = document.querySelector(".topbar");
  tb.classList.toggle("cxl-on", isCxl);
  tb.classList.toggle("shp-on", isShp);
  document.getElementById("cxl-banner").classList.toggle("show", isCxl);
  document.getElementById("shp-banner").classList.toggle("show", isShp);
  // 모드별 버튼 노출
  document.getElementById("save-btn").style.display = (isCxl||isShp) ? "none" : "";
  document.getElementById("shp-btn").style.display  = "none";
}

function toggleMainMode() {
  // BOX → PALLET → SHIP_STOCK → CANCEL → BOX 순환
  const order = ['BOX','PALLET','SHIP_STOCK','CANCEL'];
  CFG.mode = order[(order.indexOf(CFG.mode)+1) % order.length];
  updateModeUI();
  document.getElementById("result").style.display = "none";
  document.getElementById("save-btn").style.display = "none";
  document.getElementById("shp-btn").style.display = "none";
  hideCxlConfirm();
  pending = null; cxlPending = null; shpPending = null;
  if (PLAN.length) renderAll();
}

function hideCxlConfirm() {
  const c = document.getElementById("cxl-confirm");
  c.classList.remove("show"); c.innerHTML = "";
}

function startClock() {
  const el = document.getElementById("clock");
  const t  = () => el.textContent = new Date().toLocaleTimeString("ko-KR",{hour12:false});
  t(); setInterval(t,1000);
}

// ── 데이터 로드 ────────────────────────────────
async function loadAll() {
  showLoad("데이터 로딩 중...");
  try {
    // PLAN 로드
    const r1   = await fetch(URL+"?action=getPlan&containerNo="+encodeURIComponent(CFG.cont)+"&date="+CFG.date);
    const d1   = await r1.json();
    if (d1.status==="ok") PLAN = d1.plan.map(p=>({...p, boxEA:0, palletEA:0}));

    // SCAN_LOG 로드 — 기존 스캔 누적 복원
    // 날짜는 서버에서 필터링하지 않고 전체로 가져온 뒤, PLAN 항목 자신의 date(서버가 계산한 값)와
    // 직접 비교한다. 클라이언트 시계/시간대 오차로 CFG.date가 어긋나도 영향받지 않도록 하기 위함.
    const r2   = await fetch(URL+"?action=getScanLog&containerNo="+encodeURIComponent(CFG.cont));
    const d2   = await r2.json();
    if (d2.status==="ok") {
      d2.logs.forEach(log => {
        // 취소된 내역은 복원하지 않는다 — 서버가 필터링하지 않는 구버전 대비 이중 방어
        const st = String(log.status||"").toUpperCase();
        if (st === "CANCELLED" || st === "SPLIT_OUT") return;
        const item = PLAN.find(p=>p.qrKey===log.qrKey);
        if (!item) return;
        if (log.boxId) scannedBoxes.add(String(log.boxId).trim());
        const t = (log.scanType||"BOX").toUpperCase();
        if (t === "PALLET") item.palletEA += (Number(log.qty)||0);
        else                 item.boxEA   += (Number(log.qty)||0);
      });
    }
  } catch(e) {
    PLAN=[];
  }
  hideLoad();
  renderAll();
}

// ── 카메라 ────────────────────────────────────
function initCam() {
  scanner = new Html5Qrcode("qr-reader");
  scanner.start(
    {facingMode:"environment"},
    {fps:12, qrbox:{width:220,height:220}},
    onScan, ()=>{}
  ).catch(()=>{
    document.getElementById("qr-reader").innerHTML=
      "<div style='padding:20px;text-align:center;color:#fff;font-size:13px'>카메라 접근 불가</div>";
  });
}

function onScan(text) {
  const now = Date.now();
  if (text===lastQR && now-lastT<2500) return;
  lastQR=text; lastT=now;
  if      (CFG.mode === 'CANCEL')     processCancelScan(text);
  else if (CFG.mode === 'SHIP_STOCK') processShipStockScan(text);
  else                                processBoxScan(text);
}

// ── BOX 스캔 처리 ─────────────────────────────
function processBoxScan(rawQR) {
  pending = null;
  const card = document.getElementById("result");
  card.style.display = "block";
  document.getElementById("save-btn").style.display = "none";

  // QR 파싱: QR_KEY|수량|고유ID  (BOX/PALLET 동일 형식, ID 첫글자로 구분: B=BOX, P=PALLET)
  const parts   = rawQR.split("|");
  const qrKey   = parts[0].trim();
  const qty     = parseInt(parts[1]) || 1;
  const boxId   = parts[2] ? parts[2].trim() : null;
  const isPlt   = boxId && boxId.charAt(0).toUpperCase() === "P";
  const typeLbl = isPlt ? "PALLET" : "BOX";

  // 형식 자체가 잘못된 QR (구분자 없음)
  if (!boxId) {
    card.className = "result err";
    card.innerHTML = `<div class="r-name">❌ 인식할 수 없는 QR</div>
      <div class="r-msg err-txt">BOX/PALLET QR이 아닙니다</div>`;
    return;
  }

  // 선택한 스캔 모드와 다른 종류의 QR을 찍은 경우
  if (typeLbl !== CFG.mode) {
    card.className = "result err";
    card.innerHTML = `<div class="r-name">❌ 모드 불일치</div>
      <div class="r-sub">${boxId}</div>
      <div class="r-msg err-txt">현재 ${CFG.mode} 모드인데 ${typeLbl} QR을 스캔했습니다.<br>화면 상단의 모드를 확인하거나 다시 시작해서 모드를 전환하세요.</div>`;
    vibrate([200,100,200]);
    return;
  }

  // 중복 체크 (ID는 전역 고유 — BOX/PALLET 공통)
  // ※ 재스캔을 취소 트리거로 쓰지 않는다. 현장에서 중복 스캔은 흔한 실수이며,
  //    여기에 취소를 묶으면 실수로 멀쩡한 등록이 지워진다. 취소는 반드시 취소 모드에서만.
  if (boxId && scannedBoxes.has(boxId)) {
    card.className = "result dup";
    card.innerHTML = `<div class="r-name">⚠ 중복 스캔</div>
      <div class="r-sub">${boxId}</div>
      <div class="r-msg warn-txt">이미 저장된 ${typeLbl}입니다<br>
      <span style="font-weight:400;color:#92400E">취소하려면 상단 모드를 🔴 취소로 전환하십시오</span></div>`;
    vibrate([100]);
    return;
  }

  // 품목 확인
  const item = PLAN.find(p=>p.qrKey===qrKey);
  if (!item && PLAN.length>0) {
    card.className = "result err";
    card.innerHTML = `<div class="r-name">❌ 오적재 감지!</div>
      <div class="r-sub">${qrKey}</div>
      <div class="r-msg err-txt">이 컨테이너 계획에 없는 품목</div>`;
    vibrate([200,100,200]);
    return;
  }

  const planItem  = item || {qrKey,partCode:qrKey,partName:qrKey,customer:"",planQty:null,boxEA:0,palletEA:0};
  const planEA    = planItem.planQty || 0;
  const nowEA     = (typeLbl === "PALLET" ? planItem.palletEA : planItem.boxEA) || 0;
  const afterEA   = nowEA + qty;
  const pct       = planEA ? Math.min(100,Math.round(afterEA/planEA*100)) : 0;

  pending = {...planItem, rawQR, boxId, qty, scanType:typeLbl};

  card.className = "result ok";
  card.innerHTML = `
    <div class="r-name">${planItem.partName}</div>
    <div class="r-sub">${planItem.partCode} | ${planItem.customer}${boxId?" | "+boxId:""}</div>
    <div class="qty-badge">
      <div><div class="qty-lbl">이번 ${typeLbl}</div><div class="qty-num">${qty.toLocaleString()}</div></div>
      <div style="text-align:right"><div class="qty-lbl">누적</div><div class="qty-unit">${afterEA.toLocaleString()}/${planEA?planEA.toLocaleString():"?"}EA</div></div>
    </div>
    <div class="prog-bg"><div class="prog-fill ${pct>=100?"fill-done":"fill-prog"}" style="width:${pct}%"></div></div>`;

  document.getElementById("save-btn").style.display = "block";
  document.getElementById("save-btn").disabled      = false;
  document.getElementById("save-btn").textContent   = `✅ ${typeLbl} 저장`;
  vibrate([50]);
}

// ── 저장 ──────────────────────────────────────
async function doSave() {
  if (!pending) return;
  document.getElementById("save-btn").disabled = true;
  await saveBox();
}

// ── 종합 현황 조회 (고객/BOX_QTY/PALLET_QTY/PLAN_QTY/최종판정) ──
async function fetchStatus(qrKey) {
  const box = document.getElementById("status-box");
  if (!box) return;
  try {
    const res = await fetch(URL + "?action=getStatus&qrKey=" + encodeURIComponent(qrKey));
    const data = await res.json();
    if (data.status !== "ok" || !data.info) { box.textContent = ""; return; }
    const info = data.info;
    const okColor = info.passed ? "#16A34A" : "#B45309";
    box.innerHTML = `
      <div style="display:flex;justify-content:space-between;border-top:1px solid #E5E7EB;padding-top:8px;margin-top:4px">
        <span style="font-weight:600">${info.customer||"-"}</span>
        <span>PLAN ${info.planQty.toLocaleString()}EA</span>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:4px">
        <span>📦 BOX ${info.boxQty.toLocaleString()}EA</span>
        <span>🏗️ PALLET ${info.palletQty.toLocaleString()}EA</span>
      </div>
      <div style="margin-top:6px;font-weight:700;color:${okColor}">${info.result}</div>`;
  } catch(e) {
    box.textContent = "";
  }
}

async function saveBox() {
  const typeLbl = pending.scanType || "BOX";
  showLoad(`${typeLbl} 저장 중...`);
  let data;
  try {
    const res = await fetch(URL, {
      method:"POST",
      body: JSON.stringify({
        action     : "scanBox",
        qrKey      : pending.qrKey,
        containerNo: CFG.cont,
        qty        : pending.qty,
        scanBy     : CFG.worker,
        boxId      : pending.boxId || "",
        scanType   : typeLbl,
        date       : CFG.date,
      }),
    });
    data = await res.json();
  } catch(e) {
    // ★ 실패를 숨기지 않고 정직하게 표시 (이전 버그 수정)
    hideLoad();
    const card = document.getElementById("result");
    card.className = "result err";
    card.innerHTML = `<div class="r-name">❌ 저장 실패 (통신 오류)</div>
      <div class="r-sub">${pending.boxId||""}</div>
      <div class="r-msg err-txt">네트워크/서버 연결 실패 — 다시 시도하세요</div>
      <div class="r-sub" style="margin-top:6px;font-family:monospace;font-size:10px">${String(e).slice(0,80)}</div>`;
    document.getElementById("save-btn").disabled = false;
    vibrate([200,100,200]);
    return;
  }

  hideLoad();

  if (data && data.status==="ok") {
    // 저장 성공 시에만 누적 반영
    if (pending.boxId) scannedBoxes.add(pending.boxId);
    const item = PLAN.find(p=>p.qrKey===pending.qrKey);
    if (item) {
      if (pending.scanType === "PALLET") item.palletEA = (item.palletEA||0) + pending.qty;
      else                                item.boxEA    = (item.boxEA||0) + pending.qty;
    }
    renderAll();

    const qrKeySaved = pending.qrKey;
    const card = document.getElementById("result");
    card.className = "result ok";
    card.innerHTML = `<div class="r-name">✅ 저장 완료</div>
      <div class="r-sub">${pending.partName||pending.qrKey}</div>
      <div class="r-msg ok-txt">${data.msg||(typeLbl+" 저장되었습니다")}</div>
      <div id="status-box" style="margin-top:8px;font-size:12px;color:var(--muted)">현황 조회 중...</div>`;

    document.getElementById("save-btn").style.display = "none";
    vibrate(data.isDone?[50,50,100,50,100]:[50]);
    pending = null;

    // ── 고객/BOX_QTY/PALLET_QTY/최종판정 종합 조회 ──
    fetchStatus(qrKeySaved);
  } else {
    // 서버가 error 반환 (중복/마스터없음 등) — 정직하게 표시
    const card = document.getElementById("result");
    card.className = "result err";
    card.innerHTML = `<div class="r-name">❌ 저장 거부됨</div>
      <div class="r-msg err-txt">${(data&&data.msg)||"알 수 없는 오류"}</div>`;
    document.getElementById("save-btn").disabled = false;
    vibrate([200,100,200]);
    pending = null;
  }
}



// ══════════════════════════════════════════════
//  재고 출하 모드 — 계획 무관, 재고(STOCK) BOX만 출하
//  전일 잔량 BOX를 다음날 출하할 때 오적재 차단을 우회하되,
//  "재고에 실제 STOCK 상태로 있는가"를 서버에서 검증한다.
// ══════════════════════════════════════════════
let shpPending = null;

async function processShipStockScan(rawQR) {
  shpPending = null;
  const card = document.getElementById("result");
  card.style.display = "block";
  document.getElementById("shp-btn").style.display = "none";

  const parts = rawQR.split("|");
  const qrKey = parts[0].trim();
  const qty   = parseInt(parts[1]) || 0;
  const boxId = parts[2] ? parts[2].trim() : null;

  if (!boxId || boxId.charAt(0).toUpperCase() === "P") {
    card.className = "result err";
    card.innerHTML = `<div class="r-name">❌ BOX QR이 아닙니다</div>
      <div class="r-msg err-txt">재고 출하는 BOX 단위로만 가능합니다</div>`;
    vibrate([200,100,200]);
    return;
  }

  // 서버에서 실제 상태 조회 — 재고(STOCK)인 것만 통과
  showLoad("재고 확인 중...");
  let info;
  try {
    const res = await fetch(URL + "?action=boxInfo&boxId=" + encodeURIComponent(boxId));
    info = await res.json();
  } catch(e) {
    hideLoad();
    card.className = "result err";
    card.innerHTML = `<div class="r-name">❌ 조회 실패 (통신 오류)</div>
      <div class="r-msg err-txt">${String(e).slice(0,80)}</div>`;
    vibrate([200,100,200]);
    return;
  }
  hideLoad();

  if (!info || !info.ok) {
    card.className = "result err";
    card.innerHTML = `<div class="r-name">❌ 등록되지 않은 BOX</div>
      <div class="r-sub">${boxId}</div>
      <div class="r-msg err-txt">${(info && info.error) || "재고에 없습니다"}</div>`;
    vibrate([200,100,200]);
    return;
  }

  const box = info.box;
  const st  = String(box.status||"").toUpperCase();

  // 재고 상태별 판정
  if (st === "SHIPPED") {
    card.className = "result err";
    card.innerHTML = `<div class="r-name">❌ 이미 출하됨</div>
      <div class="r-sub">${boxId}</div>
      <div class="r-msg err-txt">이 BOX는 이미 출하 처리되었습니다</div>`;
    vibrate([200,100,200]); return;
  }
  if (st === "CANCELLED") {
    card.className = "result err";
    card.innerHTML = `<div class="r-name">❌ 취소된 BOX</div>
      <div class="r-msg err-txt">취소된 BOX는 출하할 수 없습니다. 재발행하십시오.</div>`;
    vibrate([200,100,200]); return;
  }
  if (st === "HOLD") {
    card.className = "result dup";
    card.innerHTML = `<div class="r-name">⚠ 보류(HOLD) 상태</div>
      <div class="r-sub">${boxId}</div>
      <div class="r-msg warn-txt">보류 해제 후 출하하십시오</div>`;
    vibrate([100]); return;
  }
  if (st !== "STOCK") {
    card.className = "result err";
    card.innerHTML = `<div class="r-name">❌ 출하 불가</div>
      <div class="r-msg err-txt">상태: ${st||"미상"}</div>`;
    vibrate([200,100,200]); return;
  }

  // 중복 방지 — 이번 세션에서 이미 출하 스캔한 BOX
  if (scannedBoxes.has(boxId)) {
    card.className = "result dup";
    card.innerHTML = `<div class="r-name">⚠ 이미 스캔됨</div>
      <div class="r-sub">${boxId}</div>
      <div class="r-msg warn-txt">이번 세션에서 이미 처리한 BOX입니다</div>`;
    vibrate([100]); return;
  }

  shpPending = { qrKey:box.qrKey, qty:box.qty, boxId, partName:box.partName, partCode:box.partCode };

  card.className = "result shp";
  card.innerHTML = `<div class="r-name" style="color:#1D4ED8">🚚 재고 출하 대상</div>
    <div class="r-sub">${box.partCode} | ${box.customer} | ${boxId}</div>
    <div class="qty-badge" style="background:#1D4ED8">
      <div><div class="qty-lbl">이 BOX</div><div class="qty-num">${(box.qty||0).toLocaleString()}</div></div>
      <div style="text-align:right"><div class="qty-lbl">상태</div><div class="qty-unit">재고 → 출하</div></div>
    </div>
    <div class="r-sub" style="margin-top:4px">컨테이너: <b>${CFG.cont==="TBD"?"⚠ 미정 — 시작화면에서 배정 필요":CFG.cont}</b></div>`;

  const btn = document.getElementById("shp-btn");
  btn.style.display = "block";
  btn.disabled = (CFG.cont === "TBD");
  vibrate([50]);
}

async function doShipStock() {
  if (!shpPending) return;
  if (CFG.cont === "TBD") {
    alert("컨테이너 번호가 없습니다. 다시 시작해서 컨테이너를 배정하십시오.");
    return;
  }
  document.getElementById("shp-btn").disabled = true;
  showLoad("재고 출하 처리 중...");
  let data;
  try {
    const res = await fetch(URL, {
      method: "POST",
      body: JSON.stringify({
        action     : "ship",
        boxIds     : [shpPending.boxId],
        containerNo: CFG.cont,
        shipDate   : CFG.date,
        shippedBy  : CFG.worker,
      }),
    });
    data = await res.json();
  } catch(e) {
    hideLoad();
    const card = document.getElementById("result");
    card.className = "result err";
    card.innerHTML = `<div class="r-name">❌ 출하 실패 (통신 오류)</div>
      <div class="r-sub">${shpPending.boxId}</div>
      <div class="r-msg err-txt">${String(e).slice(0,80)}</div>`;
    document.getElementById("shp-btn").disabled = false;
    vibrate([200,100,200]);
    return;
  }
  hideLoad();

  // ship 백엔드는 {ok:true,...} 형식
  if (data && (data.ok || data.status === "ok")) {
    scannedBoxes.add(shpPending.boxId);
    const card = document.getElementById("result");
    card.className = "result shp";
    card.innerHTML = `<div class="r-name" style="color:#1D4ED8">✅ 재고 출하 완료</div>
      <div class="r-sub">${shpPending.partName||shpPending.qrKey}</div>
      <div class="r-msg" style="color:#1D4ED8">${(shpPending.qty||0).toLocaleString()} EA 출하 · ${CFG.cont}</div>
      ${data.stockRemain!=null?`<div class="r-sub" style="margin-top:4px">잔여 재고: ${Number(data.stockRemain).toLocaleString()} EA</div>`:""}`;
    document.getElementById("shp-btn").style.display = "none";
    vibrate([50,50,100]);
    shpPending = null;
  } else {
    const card = document.getElementById("result");
    card.className = "result err";
    card.innerHTML = `<div class="r-name">❌ 출하 거부됨</div>
      <div class="r-msg err-txt">${(data && (data.error||data.msg)) || "알 수 없는 오류"}</div>`;
    document.getElementById("shp-btn").disabled = false;
    vibrate([200,100,200]);
    shpPending = null;
  }
}

// ══════════════════════════════════════════════
//  취소 모드 — 별도 모드로만 동작
//  재스캔 트리거를 쓰지 않는 이유: 현장 중복 스캔이 잦아
//  실수 스캔이 곧바로 취소로 이어지기 때문.
// ══════════════════════════════════════════════
let cxlPending = null;

function processCancelScan(rawQR) {
  cxlPending = null;
  hideCxlConfirm();
  const card = document.getElementById("result");
  card.style.display = "block";
  document.getElementById("save-btn").style.display = "none";

  const parts = rawQR.split("|");
  const qrKey = parts[0].trim();
  const qty   = parseInt(parts[1]) || 0;
  const boxId = parts[2] ? parts[2].trim() : null;

  if (!boxId) {
    card.className = "result err";
    card.innerHTML = `<div class="r-name">❌ 인식할 수 없는 QR</div>
      <div class="r-msg err-txt">BOX/PALLET QR이 아닙니다</div>`;
    vibrate([200,100,200]);
    return;
  }

  const typeLbl = boxId.charAt(0).toUpperCase() === "P" ? "PALLET" : "BOX";

  // 등록되지 않은 QR — 취소할 대상 자체가 없음
  if (!scannedBoxes.has(boxId)) {
    card.className = "result dup";
    card.innerHTML = `<div class="r-name">⚠ 취소할 내역 없음</div>
      <div class="r-sub">${boxId}</div>
      <div class="r-msg warn-txt">등록되지 않은 ${typeLbl}입니다.<br>
      <span style="font-weight:400">아직 저장 전이거나 다른 컨테이너 소속일 수 있습니다.</span></div>`;
    vibrate([100]);
    return;
  }

  const item = PLAN.find(p => p.qrKey === qrKey);
  const name = item ? item.partName : qrKey;
  const code = item ? item.partCode : qrKey;
  const nowEA = item ? (typeLbl==="PALLET" ? (item.palletEA||0) : (item.boxEA||0)) : 0;
  const afterEA = Math.max(0, nowEA - qty);

  cxlPending = { qrKey, qty, boxId, scanType:typeLbl, partName:name, partCode:code };

  card.className = "result cxl";
  card.innerHTML = `<div class="r-name" style="color:#B91C1C">🔴 취소 대상 확인</div>
    <div class="r-sub">${code} | ${boxId}</div>`;

  // 확인창 — 기본값은 "아니오". 실수 방지를 위해 2단계.
  const c = document.getElementById("cxl-confirm");
  c.classList.add("show");
  c.innerHTML = `
    <div class="cxl-q">이 ${typeLbl}의 등록을 취소하시겠습니까?</div>
    <div class="cxl-detail">
      품목: <b>${name}</b><br>
      ID: <b style="font-family:monospace">${boxId}</b><br>
      수량: <b>${qty.toLocaleString()} EA</b><br>
      누적: ${nowEA.toLocaleString()} → <b style="color:#B91C1C">${afterEA.toLocaleString()} EA</b>
    </div>
    <div class="cxl-actions">
      <button class="cxl-no"  onclick="cancelAbort()">아니오</button>
      <button class="cxl-yes" onclick="cancelConfirm()">예, 취소합니다</button>
    </div>`;
  vibrate([80,60,80]);
}

function cancelAbort() {
  cxlPending = null;
  hideCxlConfirm();
  document.getElementById("result").style.display = "none";
}

async function cancelConfirm() {
  if (!cxlPending) return;
  hideCxlConfirm();
  showLoad("취소 처리 중...");
  let data;
  try {
    const res = await fetch(URL, {
      method: "POST",
      body: JSON.stringify({
        action     : "cancelBox",
        qrKey      : cxlPending.qrKey,
        boxId      : cxlPending.boxId,
        containerNo: CFG.cont,
        scanType   : cxlPending.scanType,
        qty        : cxlPending.qty,
        scanBy     : CFG.worker,
        date       : CFG.date,
        reason     : "현장 취소",
      }),
    });
    data = await res.json();
  } catch(e) {
    hideLoad();
    const card = document.getElementById("result");
    card.className = "result err";
    card.innerHTML = `<div class="r-name">❌ 취소 실패 (통신 오류)</div>
      <div class="r-sub">${cxlPending.boxId}</div>
      <div class="r-msg err-txt">네트워크/서버 연결 실패 — 다시 시도하세요</div>
      <div class="r-sub" style="margin-top:6px;font-family:monospace;font-size:10px">${String(e).slice(0,80)}</div>`;
    vibrate([200,100,200]);
    return;
  }
  hideLoad();

  if (data && data.status === "ok") {
    // 성공 시에만 로컬 상태 되돌림
    scannedBoxes.delete(cxlPending.boxId);
    const item = PLAN.find(p => p.qrKey === cxlPending.qrKey);
    if (item) {
      if (cxlPending.scanType === "PALLET")
        item.palletEA = Math.max(0, (item.palletEA||0) - cxlPending.qty);
      else
        item.boxEA    = Math.max(0, (item.boxEA||0)    - cxlPending.qty);
    }
    renderAll();
    const card = document.getElementById("result");
    card.className = "result cxl";
    card.innerHTML = `<div class="r-name" style="color:#B91C1C">✅ 취소 완료</div>
      <div class="r-sub">${cxlPending.partName}</div>
      <div class="r-msg" style="color:#B91C1C">${data.msg || (cxlPending.scanType + " 등록이 취소되었습니다")}</div>
      <div class="r-sub" style="margin-top:6px">스티커를 재발행해 부착하십시오.</div>`;
    vibrate([50,50,50]);
    cxlPending = null;
  } else {
    const card = document.getElementById("result");
    card.className = "result err";
    card.innerHTML = `<div class="r-name">❌ 취소 거부됨</div>
      <div class="r-msg err-txt">${(data && data.msg) || "알 수 없는 오류"}</div>`;
    vibrate([200,100,200]);
    cxlPending = null;
  }
}

// ── 렌더 ──────────────────────────────────────
function renderAll() {
  const total = PLAN.length;
  const curEA = p => CFG.mode==='PALLET' ? (p.palletEA||0) : (p.boxEA||0);  // CANCEL 모드는 BOX 기준
  const done  = PLAN.filter(p=>p.planQty&&curEA(p)>=p.planQty).length;
  document.getElementById("k-plan").textContent = total;
  document.getElementById("k-done").textContent = done;
  document.getElementById("k-miss").textContent = total-done;
  renderItemList();
}

function renderItemList() {
  const ul = document.getElementById("item-list");
  if (!PLAN.length) {
    ul.innerHTML = "<li style='text-align:center;color:#6B7280;font-size:12px;padding:16px'>계획 데이터 없음<br>2.PLAN 시트를 확인하세요</li>";
    return;
  }
  const modeLbl = CFG.mode==='PALLET' ? 'PALLET' : 'BOX';  // CANCEL 모드는 BOX 현황 표시
  ul.innerHTML = PLAN.map(p=>{
    const plan  = p.planQty||0;
    const ea    = CFG.mode==='PALLET' ? (p.palletEA||0) : (p.boxEA||0);
    const done  = plan&&ea>=plan;
    const prog  = ea>0&&!done;
    const pct   = plan?Math.min(100,Math.round(ea/plan*100)):0;
    const qc    = done?"color:#0F6E56":prog?"color:#1D4ED8":"color:#B91C1C";
    const st    = done?`✅ ${modeLbl}완료`:prog?ea.toLocaleString()+"/"+plan.toLocaleString():"미스캔";
    const bc    = done?"fill-done":"fill-prog";
    return `<li class="li ${done?"done":prog?"prog":""}">
      <div class="li-info">
        <div class="li-name">${p.partName}</div>
        <div class="li-code">${p.partCode}</div>
        <div class="mini-bar"><div class="mini-fill ${bc}" style="width:${pct}%"></div></div>
      </div>
      <div class="li-right">
        <div class="li-qty" style="${qc}">${ea.toLocaleString()}<span style="font-size:9px;color:#6B7280">/${plan?plan.toLocaleString():"?"}</span></div>
        <div class="li-status" style="${qc}">${st}</div>
      </div>
    </li>`;
  }).join("");
}

// ── 유틸 ──────────────────────────────────────
function showLoad(t){ document.getElementById("loading-txt").textContent=t||"처리 중..."; document.getElementById("loading").classList.add("show"); }
function hideLoad(){ document.getElementById("loading").classList.remove("show"); }
function vibrate(p){ if(navigator.vibrate) navigator.vibrate(p); }
</script>
